<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

form{
    background:white;
    width:420px;
    padding:30px;
    border-radius:15px;
    box-shadow:0 8px 25px rgba(0,0,0,0.2);
}

label{
    display:block;
    margin-top:12px;
    margin-bottom:5px;
    color:#333;
    font-weight:bold;
}

input[type="text"],
textarea{
    width:100%;
    padding:12px;
    border:2px solid #ddd;
    border-radius:8px;
    font-size:15px;
    transition:0.3s;
}

input[type="text"]:focus,
textarea:focus{
    border-color:#667eea;
    box-shadow:0 0 10px rgba(102,126,234,0.4);
    outline:none;
}

input[type="radio"],
input[type="checkbox"]{
    margin:10px 5px 10px 15px;
    accent-color:#667eea;
}

textarea{
    min-height:100px;
    resize:vertical;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 5px 15px rgba(102,126,234,0.4);
}

  </style>
</head>
<body>
  <form action ="/submit.php">
<!-- Elements of form -->
 <div>
  <label for="name">name</label>
  <input id="name"type="text" placeholder="enter your name">
  </div>
  <div>
  <label for="ph">phone</label>
  <input id="ph"type="text" placeholder="enter your no">
  <input id="basic" type="radio" name="subscription"value="basic">
  <label for="basic">basic</label>  

<input id="pre" type="radio" name="subscription"value="pre">
  <label for="pre">pre</label>  
  
  <input id="sup" type="radio" name="subscription"value="sup">
  <label for="sup">sup</label>  

<div>
 <input id="male" type="checkbox" name="subscription"value="male">
  <label for="male">male</label> 

</div>

<div>

  <label for="comments">comments</label> 
<textarea id = "comments" placeholder="enter"></textarea>
</div>
</div>
</form>
</body>
</html>
