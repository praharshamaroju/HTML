<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

form{
    background:white;
    padding:30px;
    width:350px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

div{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    color:#333;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    border:2px solid #ddd;
    border-radius:8px;
    font-size:14px;
}

input:focus{
    outline:none;
    border-color:#0072ff;
    box-shadow:0 0 8px rgba(0,114,255,0.4);

button{
    width:100%;
    padding:12px;
    background:#0072ff;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;

button:hover{

</style>
</head>
